version: '3.8'
services:
  ganache:
    image: trufflesuite/ganache:latest
    ports:
      - "8545:8545"
    command: [ "--wallet.mnemonic", "candy maple cake sugar pudding cream honey rich smooth crumble sweet treat", "--networkId", "5777", "--host", "0.0.0.0", "--db", "/app/ganache_data" ]
    volumes:
      - ganache_data:/app/ganache_data
    networks:
      - forensic-net

  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "5001:5001"
      - "8081:8080"
      - "4001:4001"
    volumes:
      - ipfs_staging:/export
      - ipfs_data:/data/ipfs
    networks:
      - forensic-net

  mongo:
    image: mongo:6-jammy
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - forensic-net

  clamav:
    image: clamav/clamav:stable_base
    ports:
      - "3310:3310"
    networks:
      - forensic-net

  blockchain-deployer:
    build:
      context: ./blockchain
      dockerfile: Dockerfile
    environment:
      - TRUFFLE_NETWORK=docker
    volumes:
      - ./blockchain:/app
      - /app/node_modules
      - ./blockchain/build:/app/build
    depends_on:
      - ganache
    networks:
      - forensic-net
    command: sh -c "npm install && npx truffle compile && npx truffle migrate --network docker --reset"
    profiles:
      - deploy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/forensic_db
      - JWT_SECRET=super_secret_forensic_key_replace_me_in_prod
      - BLOCKCHAIN_URL=http://ganache:8545
      - IPFS_URL=http://ipfs:5001
      - CONTRACT_ADDRESS_PATH=/app/contracts/EvidenceChain.json
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./blockchain/build/contracts:/app/contracts # Share contract ABI
    depends_on:
      - mongo
      - ganache
      - ipfs
    networks:
      - forensic-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    networks:
      - forensic-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://frontend:3000
    depends_on:
      - frontend
    networks:
      - forensic-net

volumes:
  mongo_data:
  ganache_data:
  ipfs_data:
  ipfs_staging:


networks:
  forensic-net:
    driver: bridge
